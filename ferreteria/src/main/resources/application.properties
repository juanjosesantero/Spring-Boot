spring.application.name=ferreteria
server.port=8080

# Configuracion de la db
spring.datasource.url=jdbc:mysql://localhost:3306/db_ferreteria
# Conectividad y tipo con datasource.utl
spring.datasource.username=root
spring.datasource.password=usuario01%
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Permite hacer relaciones entre tablas, restricciones ... con Dialect

#jpa update para desarrollo
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true 
# Al subir el servidor, genera la tabla

# Si queremos que aparezcan o no las sentencias SQL en consola
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

